name: Ingest Hitokoto Quotes

on:
  workflow_dispatch:
    inputs:
      count:
        description: Number of quotes to ingest
        required: false
        default: '20'
      categories:
        description: Optional comma-separated hitokoto categories
        required: false
        default: ''
  schedule:
    - cron: '0 */6 * * *'

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ingest hitokoto quotes
        env:
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          POSTGRES_PRISMA_URL: ${{ secrets.POSTGRES_PRISMA_URL }}
          INGEST_COUNT: ${{ github.event.inputs.count || '20' }}
          INGEST_CATEGORIES: ${{ github.event.inputs.categories || '' }}
        run: |
          if [ -n "$INGEST_CATEGORIES" ]; then
            npm run quotes:ingest:hitokoto -- --count="$INGEST_COUNT" --categories="$INGEST_CATEGORIES" --delay-ms=600
          else
            npm run quotes:ingest:hitokoto -- --count="$INGEST_COUNT" --delay-ms=600
          fi
